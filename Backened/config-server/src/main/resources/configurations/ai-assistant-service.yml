server:
  port: 8087

spring:
  application:
    name: ai-assistant-service

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 3s

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    consumer:
      group-id: ai-assistant-service-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: false


  ai:
    google:
      genai:
        api-key: ${GEMINI_API_KEY:}
        chat:
          options:
            model:       ${GEMINI_MODEL:gemini-2.0-flash}
            temperature: 0.4

# ─── Eureka ──────────────────────────────────────────────────────────
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

# ─── JWT — for decoding incoming user tokens ─────────────────────────
jwt:
  secret: ${JWT_SECRET:default-secret-key-for-jwt-signing-must-be-at-least-256-bits-long}

# ─── Downstream gateway URL (used by WebClient) ──────────────────────
foodrush:
  gateway:
    url: ${GATEWAY_URL:http://api-gateway:8080}
  ai:
    # max number of past chat turns to send to Gemini as context
    memory-window: 8
    # how long to keep a conversation in Redis (seconds)
    memory-ttl-seconds: 3600

# ─── Metrics & Monitoring ────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: "health,info,prometheus,metrics"
  endpoint:
    prometheus:
      enabled: true
    health:
      show-details: always
  metrics:
    tags:
      application: ai-assistant-service
    export:
      prometheus:
        enabled: true

logging:
  level:
    com.foodDelivery.ai_assistant_service: INFO
    org.springframework.ai: INFO
